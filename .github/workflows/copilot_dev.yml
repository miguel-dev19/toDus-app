name: Copilot_Dev

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  solve:
    if: |
      contains(github.event.comment.body, '@copilot-dev') &&
      github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        id: issue
        with:
          script: |
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            return {
              title: issue.data.title,
              body: issue.data.body.substring(0, 500)
            };

      - run: |
          npm install axios
          
          cat > ask.js << 'EOF'
          const axios = require('axios');
          const fs = require('fs');
          const prompt = `Fix this Kotlin issue: ${process.env.TITLE}. ${process.env.BODY}`;
          
          axios.get('https://api.alyacore.xyz/ai/copilot', {
            params: { text: prompt, key: 'oboe' },
            timeout: 60000
          }).then(res => {
            fs.writeFileSync('solution.txt', res.data.result || res.data.text || 'No response');
          }).catch(() => {
            fs.writeFileSync('solution.txt', 'AI analysis pending');
          });
          EOF
          
          node ask.js
        env:
          TITLE: ${{ fromJson(steps.issue.outputs.result).title }}
          BODY: ${{ fromJson(steps.issue.outputs.result).body }}

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "🤖 Copilot_Dev analysis"
          title: "🤖 Copilot_Dev: ${{ fromJson(steps.issue.outputs.result).title }}"
          body: "Solución generada automáticamente para #${{ github.event.issue.number }}"
