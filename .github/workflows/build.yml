name: Build toDus APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build debug APK
      run: ./gradlew assembleDebug
      
    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/toDus_v0.6.5.apk
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: toDus_v0.6.5
        path: app/build/outputs/apk/debug/toDus_v0.6.5.apk
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: toDus v0.6.5
        tag_name: v0.6.5
        files: app/build/outputs/apk/debug/toDus_v0.6.5.apk
        body: |
          ## v0.6.5
          
          ### Arreglos
          - Subida de foto de perfil con sockets (100% funcional)
          - KSP plugin resolution
          - Puerto XMPP 1756
          
          ### Nuevo
          - Editor de perfil (alias, bio, foto)
          - Last seen en tiempo real
          - Indicador de conexion en avatar
          - Splash screen con logo
          - FAB rectangular "Nuevo Chat"
          - Contactos con boton de recargar manual
          
          ### Mejoras
          - S3Uploader sin dependencia de Smack
          - Tema oscuro completo
          - Icono oficial PNG
          - "Escribiendo..." en chat
          - Perfil de contacto al tocar avatar
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
