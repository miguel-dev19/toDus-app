name: Build y Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build debug APK
      run: ./gradlew assembleDebug
      
    - name: Obtener version
      id: version
      run: |
        if [ -f VERSION ]; then
          echo "v=$(cat VERSION)" >> $GITHUB_OUTPUT
        else
          echo "v=0.6.5" >> $GITHUB_OUTPUT
        fi
      
    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/toDus_v${{ steps.version.outputs.v }}.apk
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: toDus_v${{ steps.version.outputs.v }}
        path: app/build/outputs/apk/debug/toDus_v${{ steps.version.outputs.v }}.apk
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: toDus v${{ steps.version.outputs.v }}
        tag_name: v${{ steps.version.outputs.v }}
        files: app/build/outputs/apk/debug/toDus_v${{ steps.version.outputs.v }}.apk
        body_path: CHANGELOG.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
