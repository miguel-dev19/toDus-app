name: Build toDus APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: toDus-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: toDus v0.1
        tag_name: v0.1
        files: app/build/outputs/apk/debug/app-debug.apk
        body: |
          ## toDus v0.1 - Primer Release
          
          ### Funciones incluidas:
          - Autenticacion JWT con numero de telefono
          - Conexion XMPP (ws.todus.cu:5222)
          - Envio y recepcion de mensajes de texto
          - Lista de chats (HomeScreen)
          - Lista de contactos (ContactsScreen)
          - Chat individual con burbujas rojo/blanco
          - Estados de mensaje (enviado/entregado/leido)
          - Mensajes offline
          - Persistencia de sesion (JWT automatico)
          - Room Database local
          - 6 pantallas (Welcome, Phone, Profile, Home, Contacts, Chat)
          - Logo oficial de toDus
          - Colores oficiales
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
