name: Build toDus APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: toDus-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: toDus v0.2
        tag_name: v0.2
        files: app/build/outputs/apk/debug/app-debug.apk
        body: |
          ## v0.2
          
          - Puerto de conexion corregido
          - Tema oscuro
          - Indicador de conexion en avatar
          - Mensajes offline al iniciar
          - Sincronizacion de contactos del dispositivo
          - Persistencia de sesion y perfil
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
